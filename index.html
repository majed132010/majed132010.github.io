<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقات حروف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:2rem;text-align:center;}
.logo{font-family:'Tajawal',sans-serif;font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#e63946,#f4c430,#3a86ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem;}
.tagline{color:#8b949e;font-size:1rem;margin-bottom:1rem;}
.btns{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:340px;}
a{padding:1.2rem 1.5rem;border-radius:16px;font-family:'Cairo',sans-serif;font-size:1.15rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.8rem;transition:all 0.2s;}
.btn-host{background:linear-gradient(135deg,#e63946,#a8202b);color:white;border:1px solid rgba(255,255,255,0.1);}
.btn-host:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(230,57,70,0.35);}
.btn-play{background:#161b22;color:#e6edf3;border:2px solid #3a86ff;}
.btn-play:hover{background:rgba(58,134,255,0.1);transform:translateY(-2px);}
.version{font-size:0.75rem;color:#484f58;margin-top:1rem;}
</style>
</head>
<body>
<div class="logo">مسابقات حروف</div>
<div class="tagline">لعبة الحروف الاستراتيجية التنافسية</div>
<div class="btns">
  <a href="/host.html" class="btn-host">🎙️ أنا المقدم — أنشئ غرفة</a>
  <a href="/play.html" class="btn-play">🎮 أنا لاعب — انضم للعبة</a>
</div>
<div class="version">مسابقات حروف v1.0</div>
</body>
</html>
