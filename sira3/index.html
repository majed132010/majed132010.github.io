<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>صراع القارات - Clash of Continents</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0a0f14;
  --panel: #111d2e;
  --accent: #D4AF37;
  --accent2: #4ECDC4;
  --danger: #e74c3c;
  --text: #e8e8e8;
  --muted: #6b7a8f;
  --team1: #e74c3c;
  --team2: #3498db;
  --team3: #2ecc71;
  --team4: #f39c12;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
  width: 100%; height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.screen.active { display: flex; }

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  background: linear-gradient(135deg, #0a0f14 0%, #1a2332 100%);
}
.game-title {
  font-size: 42px;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,175,55,0.3);
}
.game-subtitle {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 40px;
}
.input-box {
  width: 100%; max-width: 320px;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 16px;
  text-align: center;
  margin-bottom: 16px;
  outline: none;
  transition: all 0.2s;
}
.input-box:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
}
.btn {
  width: 100%; max-width: 320px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #b8941f);
  color: #000;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(212,175,55,0.3); }
.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.btn-danger {
  background: linear-gradient(135deg, var(--danger), #c0392b);
  color: #fff;
}

/* ===== MENU SCREEN ===== */
#menuScreen {
  background: var(--bg);
}
.menu-card {
  width: 100%; max-width: 400px;
  background: var(--panel);
  border-radius: 20px;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.05);
}
.menu-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 24px;
  text-align: center;
  color: var(--accent);
}
.code-inputs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}
.code-digit {
  width: 56px; height: 64px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  outline: none;
  transition: all 0.2s;
}
.code-digit:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
}
.divider {
  text-align: center;
  color: var(--muted);
  margin: 16px 0;
  font-size: 14px;
  position: relative;
}
.divider::before, .divider::after {
  content: ''; position: absolute;
  top: 50%; width: 40%; height: 1px;
  background: rgba(255,255,255,0.1);
}
.divider::before { right: 0; }
.divider::after { left: 0; }

/* ===== LOBBY SCREEN ===== */
#lobbyScreen {
  background: var(--bg);
  justify-content: flex-start;
  padding: 16px;
}
.lobby-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.room-code-display {
  background: rgba(212,175,55,0.1);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 10px;
  padding: 8px 16px;
  font-size: 20px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 4px;
  cursor: pointer;
}
.lobby-section {
  width: 100%;
  background: var(--panel);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}
.section-title {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
  font-weight: 700;
}
.player-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.player-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
}
.player-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 14px; color: #000;
}
.player-name { flex: 1; font-weight: 600; }
.player-role {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  background: rgba(212,175,55,0.15);
  color: var(--accent);
}
.player-role.host { background: rgba(212,175,55,0.2); color: var(--accent); }
.player-role.coHost { background: rgba(78,205,196,0.2); color: var(--accent2); }
.player-role.viewer { background: rgba(107,122,143,0.2); color: var(--muted); }

/* ===== GAME SCREEN ===== */
#gameScreen {
  background: var(--bg);
  justify-content: flex-start;
  padding: 0;
  position: relative;
}
.game-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  z-index: 100;
}
.game-header-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.game-header-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}
.game-header-info {
  display: flex;
  gap: 12px;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
}

#mapContainer {
  flex: 1;
  width: 100%;
  position: relative;
  overflow: hidden;
  background: #0d1b2a;
}
#mapContainer svg {
  width: 100%; height: 100%;
}

.game-controls {
  width: 100%;
  padding: 12px;
  background: var(--panel);
  border-top: 1px solid rgba(255,255,255,0.05);
}
.question-box {
  background: rgba(0,0,0,0.3);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 12px;
  text-align: center;
}
.question-text {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}
.question-counter {
  font-size: 12px;
  color: var(--muted);
}
.answer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.answer-btn {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.answer-btn:hover {
  background: rgba(212,175,55,0.1);
  border-color: var(--accent);
}
.answer-btn.correct {
  background: rgba(46,204,113,0.2);
  border-color: #2ecc71;
}
.answer-btn.wrong {
  background: rgba(231,76,60,0.2);
  border-color: #e74c3c;
}

/* Chat panel */
.chat-panel {
  width: 100%;
  max-height: 120px;
  overflow-y: auto;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  padding: 8px;
  margin-bottom: 8px;
  font-size: 12px;
}
.chat-msg {
  margin-bottom: 4px;
  padding: 2px 0;
}
.chat-name {
  color: var(--accent);
  font-weight: 700;
}
.chat-input-wrap {
  display: flex;
  gap: 8px;
}
.chat-input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.chat-send {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #000;
  font-weight: 700;
  cursor: pointer;
}

/* Score overlay */
.score-overlay {
  position: absolute;
  top: 50px; left: 12px;
  display: flex;
  gap: 8px;
  z-index: 50;
}
.score-pill {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}
.score-pill.team1 { border: 1px solid var(--team1); color: var(--team1); }
.score-pill.team2 { border: 1px solid var(--team2); color: var(--team2); }

/* Toast */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: rgba(15,25,35,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Landscape prompt for mobile */
.landscape-prompt {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #000;
  z-index: 9999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}
.landscape-prompt .icon {
  font-size: 60px;
  margin-bottom: 20px;
  animation: rotatePhone 2s infinite ease-in-out;
}
@keyframes rotatePhone {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(90deg); }
}
@media (max-width: 768px) and (orientation: portrait) {
  .landscape-prompt { display: flex; }
}

/* Mute button on player */
.mute-btn {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: none;
  background: rgba(231,76,60,0.2);
  color: #e74c3c;
  font-size: 12px;
  cursor: pointer;
  margin-left: 4px;
}
.mute-btn.muted {
  background: rgba(107,122,143,0.2);
  color: var(--muted);
}

/* Start button */
.start-btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #27ae60, #2ecc71);
  color: #fff;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(46,204,113,0.3); }
.start-btn:disabled {
  background: rgba(255,255,255,0.1);
  color: var(--muted);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}
</style>
<base target="_blank">
</head>
<body>

<!-- Landscape Prompt -->
<div class="landscape-prompt" id="landscapePrompt">
  <div class="icon">📱</div>
  <h2 style="color: var(--accent); margin-bottom: 8px;">أدر الجهاز</h2>
  <p style="color: var(--muted);">يرجى تدوير الجهاز للوضع الأفقي للعب</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- SCREEN 1: LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="game-title">صراع القارات</div>
  <div class="game-subtitle">Clash of Continents</div>
  <input type="text" class="input-box" id="playerName" placeholder="أدخل اسمك" maxlength="15">
  <button class="btn btn-primary" onclick="enterMenu()">دخول</button>
</div>

<!-- SCREEN 2: MENU -->
<div class="screen" id="menuScreen">
  <div class="menu-card">
    <div class="menu-title">اختر طريقة اللعب</div>
    <button class="btn btn-primary" onclick="createRoom()">🎮 إنشاء غرفة جديدة</button>
    <div class="divider">أو</div>
    <div class="code-inputs" id="codeInputs">
      <input type="text" class="code-digit" maxlength="1" data-index="0">
      <input type="text" class="code-digit" maxlength="1" data-index="1">
      <input type="text" class="code-digit" maxlength="1" data-index="2">
      <input type="text" class="code-digit" maxlength="1" data-index="3">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">🔗 انضمام للغرفة</button>
    <button class="btn btn-secondary" onclick="backToLogin()" style="margin-top:8px;background:transparent;border:none;color:var(--muted);">← رجوع</button>
  </div>
</div>

<!-- SCREEN 3: LOBBY -->
<div class="screen" id="lobbyScreen">
  <div class="lobby-header">
    <button class="game-header-btn" onclick="exitLobby()">✕</button>
    <div class="room-code-display" id="roomCodeDisplay" onclick="copyCode()">----</div>
    <div style="width:36px"></div>
  </div>

  <div class="lobby-section">
    <div class="section-title">👑 المقدم</div>
    <div class="player-list" id="hostList"></div>
  </div>

  <div class="lobby-section">
    <div class="section-title">🎮 اللاعبون (<span id="playerCount">0</span>)</div>
    <div class="player-list" id="playerList"></div>
  </div>

  <div class="lobby-section">
    <div class="section-title">👁️ المشاهدون (<span id="viewerCount">0</span>)</div>
    <div class="player-list" id="viewerList"></div>
  </div>

  <button class="start-btn" id="startBtn" onclick="startGame()" style="display:none;">▶ ابدأ اللعبة</button>
  <button class="btn btn-secondary" id="joinAsPlayerBtn" onclick="joinAsPlayer()" style="margin-top:8px;">🎮 انضمام كلاعب</button>
</div>

<!-- SCREEN 4: GAME -->
<div class="screen" id="gameScreen">
  <div class="game-header">
    <button class="game-header-btn" onclick="exitGame()">🚪</button>
    <div class="game-header-title">صراع القارات</div>
    <div class="game-header-info">
      <span id="gameTimer">⏱️ 00:00</span>
      <span id="gamePlayers">👥 0</span>
    </div>
  </div>

  <div class="score-overlay" id="scoreOverlay">
    <div class="score-pill team1">🔴 <span id="score1">0</span></div>
    <div class="score-pill team2">🔵 <span id="score2">0</span></div>
  </div>

  <div id="mapContainer"></div>

  <div class="game-controls">
    <div class="question-box" id="questionBox">
      <div class="question-text" id="questionText">في انتظار بدء اللعبة...</div>
      <div class="question-counter" id="questionCounter">-/-</div>
    </div>
    <div class="answer-grid" id="answerGrid" style="display:none;">
      <button class="answer-btn" onclick="answer(0)" id="ans0">-</button>
      <button class="answer-btn" onclick="answer(1)" id="ans1">-</button>
      <button class="answer-btn" onclick="answer(2)" id="ans2">-</button>
      <button class="answer-btn" onclick="answer(3)" id="ans3">-</button>
    </div>
    <div class="chat-panel" id="gameChat"></div>
    <div class="chat-input-wrap">
      <input type="text" class="chat-input" id="gameChatInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')sendGameChat()">
      <button class="chat-send" onclick="sendGameChat()">➤</button>
    </div>
  </div>
</div>

<script>
// ===================== FIREBASE CONFIG =====================
const firebaseConfig = {
  apiKey: "AIzaSyD5D05asR_bVoJV3oRnI7QoC0nfmpC7p3g",
  authDomain: "clash-of-continents.firebaseapp.com",
  databaseURL: "https://clash-of-continents-default-rtdb.firebaseio.com",
  projectId: "clash-of-continents",
  storageBucket: "clash-of-continents.firebasestorage.app",
  messagingSenderId: "219997606203",
  appId: "1:219997606203:web:68e13dc3632f2daf51a71e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===================== STATE =====================
let myName = '';
let myUid = 'user_' + Math.random().toString(36).substr(2, 9);
let myRole = 'viewer'; // host, coHost, player, viewer
let currentRoom = null;
let roomRef = null;
let roomListener = null;
let isHost = false;
let currentQuestion = 0;
let questions = [
  { q: "أين تقع الأندلس؟", a: ["مصر", "الأندلس (إسبانيا)", "سوريا", "العراق"], correct: 1 },
  { q: "ما هي عاصمة الخلافة العباسية؟", a: ["دمشق", "القاهرة", "بغداد", "الكوفة"], correct: 2 },
  { q: "من هو قائد معركة اليرموك؟", a: ["خالد بن الوليد", "عمرو بن العاص", "سعد بن أبي وقاص", "أبو عبيدة"], correct: 0 },
  { q: "في أي عام سقطت غرناطة؟", a: ["1492م", "1453م", "1517م", "1291م"], correct: 0 },
  { q: "ما هي أكبر قارة في العالم؟", a: ["أفريقيا", "آسيا", "أمريكا الشمالية", "أوروبا"], correct: 1 },
  { q: "أين تقع مدينة تدمر؟", a: ["العراق", "سوريا", "الأردن", "لبنان"], correct: 1 },
  { q: "من هو مؤسس الدولة الأموية؟", a: ["معاوية بن أبي سفيان", "الحسن بن علي", "معمر القذافي", "أبو بكر الصديق"], correct: 0 },
  { q: "ما هي عاصمة المملكة العربية السعودية؟", a: ["جدة", "الرياض", "مكة", "المدينة"], correct: 1 },
  { q: "في أي بحر تقع جزيرة صقلية؟", a: ["البحر الأحمر", "البحر المتوسط", "البحر الأسود", "المحيط الأطلسي"], correct: 1 },
  { q: "من هو صاحب فتح مصر؟", a: ["خالد بن الوليد", "عمرو بن العاص", "سعد بن أبي وقاص", "أبو عبيدة"], correct: 1 }
];

// ===================== UTILS =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function generateCode() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

// ===================== LOGIN =====================
function enterMenu() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) { toast('أدخل اسمك أولاً'); return; }
  myName = name;
  showScreen('menuScreen');
}
function backToLogin() {
  showScreen('loginScreen');
}

// ===================== CODE INPUTS =====================
document.querySelectorAll('.code-digit').forEach((input, idx) => {
  input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0,1);
    if (e.target.value && idx < 3) {
      document.querySelectorAll('.code-digit')[idx+1].focus();
    }
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && idx > 0) {
      document.querySelectorAll('.code-digit')[idx-1].focus();
    }
  });
});

// ===================== ROOM =====================
async function createRoom() {
  try {
    const code = generateCode();
    currentRoom = code;
    myRole = 'host';
    isHost = true;

    await db.ref('gameRooms/' + code).set({
    hostUid: myUid,
    hostName: myName,
    coHostUid: null,
    coHostName: null,
    status: 'waiting',
    createdAt: Date.now(),
    currentQuestion: -1,
    scores: { team1: 0, team2: 0 },
    players: {
      [myUid]: { name: myName, team: 1, score: 0, role: 'host' }
    },
    viewers: {},
    chat: {}
  });

  // Auto-delete after 30 minutes
  setTimeout(() => {
    db.ref('gameRooms/' + code).remove();
  }, 30 * 60 * 1000);

  enterLobby(code);
  } catch(e) {
    console.error('createRoom error:', e);
    toast('❌ خطأ: ' + (e.message || 'تأكد من Firebase Rules'));
  }
}

async function joinRoom() {
  try {
  const digits = document.querySelectorAll('.code-digit');
  const code = Array.from(digits).map(d => d.value).join('');
  if (code.length !== 4) { toast('أدخل الكود كاملاً'); return; }

  const snap = await db.ref('gameRooms/' + code).once('value');
  if (!snap.exists()) { toast('الكود غير صحيح'); return; }

  currentRoom = code;
  const room = snap.val();

  // Check if already in room
  if (room.players && room.players[myUid]) {
    myRole = room.players[myUid].role;
  } else if (room.viewers && room.viewers[myUid]) {
    myRole = 'viewer';
  } else {
    // Join as viewer first
    myRole = 'viewer';
    await db.ref('gameRooms/' + code + '/viewers/' + myUid).set({
      name: myName, joinedAt: Date.now()
    });
  }

  enterLobby(code);
  } catch(e) {
    console.error('joinRoom error:', e);
    toast('❌ خطأ: ' + (e.message || 'الكود غير صحيح أو مشكلة في الاتصال'));
  }
}

function enterLobby(code) {
  showScreen('lobbyScreen');
  document.getElementById('roomCodeDisplay').textContent = code;
  document.getElementById('startBtn').style.display = isHost ? 'block' : 'none';
  document.getElementById('joinAsPlayerBtn').style.display = myRole === 'viewer' ? 'block' : 'none';

  listenRoom(code);
}

function listenRoom(code) {
  if (roomListener) roomListener.off();
  roomRef = db.ref('gameRooms/' + code);
  roomListener = roomRef.on('value', (snap) => {
    const room = snap.val();
    if (!room) { toast('الغرفة مغلقة'); backToMenu(); return; }
    renderLobby(room);

    if (room.status === 'playing' && document.getElementById('gameScreen').classList.contains('active') === false) {
      enterGame(room);
    }
    if (room.status === 'playing') {
      updateGameUI(room);
    }
  });
}

function renderLobby(room) {
  // Host
  const hostList = document.getElementById('hostList');
  hostList.innerHTML = '';
  if (room.hostName) {
    hostList.innerHTML = `<div class="player-item">
      <div class="player-avatar">${room.hostName[0]}</div>
      <div class="player-name">${room.hostName}</div>
      <div class="player-role host">مقدم</div>
      ${isHost ? '' : `<button class="mute-btn" onclick="muteUser('${room.hostUid}', 'host')">🔇</button>`}
    </div>`;
  }

  // Players
  const playerList = document.getElementById('playerList');
  playerList.innerHTML = '';
  let pCount = 0;
  if (room.players) {
    Object.entries(room.players).forEach(([uid, p]) => {
      if (p.role === 'host') return;
      pCount++;
      const canMute = isHost || myRole === 'coHost';
      playerList.innerHTML += `<div class="player-item">
        <div class="player-avatar" style="background:linear-gradient(135deg, var(--team${p.team}), var(--team${p.team}))">${p.name[0]}</div>
        <div class="player-name">${p.name}</div>
        <div class="player-role">لاعب</div>
        ${canMute ? `<button class="mute-btn" onclick="muteUser('${uid}', 'player')">🔇</button>` : ''}
      </div>`;
    });
  }
  document.getElementById('playerCount').textContent = pCount;

  // Viewers
  const viewerList = document.getElementById('viewerList');
  viewerList.innerHTML = '';
  let vCount = 0;
  if (room.viewers) {
    Object.entries(room.viewers).forEach(([uid, v]) => {
      vCount++;
      const canMute = isHost || myRole === 'coHost';
      viewerList.innerHTML += `<div class="player-item">
        <div class="player-avatar" style="background:#555">${v.name[0]}</div>
        <div class="player-name">${v.name}</div>
        <div class="player-role viewer">مشاهد</div>
        ${canMute ? `<button class="mute-btn" onclick="muteUser('${uid}', 'viewer')">🔇</button>` : ''}
      </div>`;
    });
  }
  document.getElementById('viewerCount').textContent = vCount;
}

async function joinAsPlayer() {
  if (!currentRoom) return;
  const snap = await db.ref('gameRooms/' + currentRoom).once('value');
  const room = snap.val();
  const team = room.players && Object.keys(room.players).length % 2 === 0 ? 1 : 2;

  // Remove from viewers
  await db.ref('gameRooms/' + currentRoom + '/viewers/' + myUid).remove();
  // Add to players
  await db.ref('gameRooms/' + currentRoom + '/players/' + myUid).set({
    name: myName, team: team, score: 0, role: 'player'
  });
  myRole = 'player';
  document.getElementById('joinAsPlayerBtn').style.display = 'none';
}

async function startGame() {
  if (!currentRoom || !isHost) return;
  await db.ref('gameRooms/' + currentRoom).update({
    status: 'playing',
    currentQuestion: 0,
    startTime: Date.now()
  });
}

function copyCode() {
  navigator.clipboard.writeText(currentRoom).then(() => toast('تم نسخ الكود'));
}

async function exitLobby() {
  if (roomListener) roomListener.off();
  if (currentRoom) {
    const snap = await db.ref('gameRooms/' + currentRoom).once('value');
    const room = snap.val();
    if (room) {
      if (room.hostUid === myUid) {
        // Host leaving -> delete room
        await db.ref('gameRooms/' + currentRoom).remove();
      } else {
        await db.ref('gameRooms/' + currentRoom + '/players/' + myUid).remove();
        await db.ref('gameRooms/' + currentRoom + '/viewers/' + myUid).remove();
      }
    }
  }
  currentRoom = null;
  myRole = 'viewer';
  isHost = false;
  showScreen('menuScreen');
}

function backToMenu() {
  showScreen('menuScreen');
}

// ===================== GAME =====================
let gameTimer = null;
let gameSeconds = 0;

function enterGame(room) {
  showScreen('gameScreen');
  initMap();
  startGameTimer();
  listenChat();
  renderQuestion(room);
}

function startGameTimer() {
  gameSeconds = 0;
  if (gameTimer) clearInterval(gameTimer);
  gameTimer = setInterval(() => {
    gameSeconds++;
    const m = Math.floor(gameSeconds / 60).toString().padStart(2, '0');
    const s = (gameSeconds % 60).toString().padStart(2, '0');
    document.getElementById('gameTimer').textContent = `⏱️ ${m}:${s}`;
  }, 1000);
}

function updateGameUI(room) {
  document.getElementById('score1').textContent = room.scores?.team1 || 0;
  document.getElementById('score2').textContent = room.scores?.team2 || 0;
  document.getElementById('gamePlayers').textContent = `👥 ${Object.keys(room.players || {}).length}`;

  if (room.currentQuestion !== currentQuestion) {
    currentQuestion = room.currentQuestion;
    renderQuestion(room);
  }
}

function renderQuestion(room) {
  const qIdx = room.currentQuestion || 0;
  if (qIdx < 0 || qIdx >= questions.length) {
    document.getElementById('questionText').textContent = 'انتهت اللعبة!';
    document.getElementById('questionCounter').textContent = '';
    document.getElementById('answerGrid').style.display = 'none';
    return;
  }
  const q = questions[qIdx];
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('questionCounter').textContent = `${qIdx + 1}/${questions.length}`;
  document.getElementById('answerGrid').style.display = 'grid';

  q.a.forEach((ans, i) => {
    const btn = document.getElementById('ans' + i);
    btn.textContent = ans;
    btn.className = 'answer-btn';
    btn.disabled = false;
  });
}

async function answer(idx) {
  if (!currentRoom) return;
  const q = questions[currentQuestion];
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);

  if (idx === q.correct) {
    btns[idx].classList.add('correct');
    toast('✅ إجابة صحيحة!');
    // Update score
    const snap = await db.ref('gameRooms/' + currentRoom + '/players/' + myUid).once('value');
    const player = snap.val();
    if (player) {
      const teamKey = 'team' + player.team;
      const currentScore = (await db.ref('gameRooms/' + currentRoom + '/scores/' + teamKey).once('value')).val() || 0;
      await db.ref('gameRooms/' + currentRoom + '/scores/' + teamKey).set(currentScore + 10);
    }
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    toast('❌ إجابة خاطئة');
  }

  // Next question after 2s (host only)
  if (isHost) {
    setTimeout(async () => {
      const nextQ = currentQuestion + 1;
      await db.ref('gameRooms/' + currentRoom).update({ currentQuestion: nextQ });
    }, 2000);
  }
}

// ===================== CHAT =====================
function listenChat() {
  if (!currentRoom) return;
  db.ref('gameRooms/' + currentRoom + '/chat').limitToLast(20).on('child_added', (snap) => {
    const msg = snap.val();
    const chat = document.getElementById('gameChat');
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = `<span class="chat-name">${msg.name}:</span> ${msg.text}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });
}

async function sendGameChat() {
  const input = document.getElementById('gameChatInput');
  const text = input.value.trim();
  if (!text || !currentRoom) return;
  await db.ref('gameRooms/' + currentRoom + '/chat').push({
    uid: myUid, name: myName, text, ts: Date.now()
  });
  input.value = '';
}

// ===================== MUTE =====================
async function muteUser(uid, type) {
  if (!currentRoom) return;
  if (!isHost && myRole !== 'coHost') return;
  const path = type === 'viewer' ? 'viewers/' + uid + '/muted' : 'players/' + uid + '/muted';
  const current = (await db.ref('gameRooms/' + currentRoom + '/' + path).once('value')).val();
  await db.ref('gameRooms/' + currentRoom + '/' + path).set(!current);
  toast(current ? '🔊 تم إلغاء الكتم' : '🔇 تم الكتم');
}

// ===================== EXIT GAME =====================
async function exitGame() {
  if (!confirm('هل تريد الخروج من اللعبة؟')) return;
  if (gameTimer) clearInterval(gameTimer);
  if (roomListener) roomListener.off();
  if (currentRoom) {
    const snap = await db.ref('gameRooms/' + currentRoom).once('value');
    const room = snap.val();
    if (room && room.hostUid === myUid) {
      await db.ref('gameRooms/' + currentRoom).remove();
    } else {
      await db.ref('gameRooms/' + currentRoom + '/players/' + myUid).remove();
      await db.ref('gameRooms/' + currentRoom + '/viewers/' + myUid).remove();
    }
  }
  currentRoom = null;
  myRole = 'viewer';
  isHost = false;
  showScreen('menuScreen');
}

// ===================== D3 MAP =====================
function initMap() {
  const container = document.getElementById('mapContainer');
  container.innerHTML = '';

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select('#mapContainer').append('svg')
    .attr('width', width)
    .attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

  // Background
  svg.append('rect')
    .attr('width', width)
    .attr('height', height)
    .attr('fill', '#0d1b2a');

  // Grid lines
  for (let i = 0; i < 10; i++) {
    svg.append('line')
      .attr('x1', 0).attr('y1', i * height / 10)
      .attr('x2', width).attr('y2', i * height / 10)
      .attr('stroke', 'rgba(255,255,255,0.03)')
      .attr('stroke-width', 1);
    svg.append('line')
      .attr('x1', i * width / 10).attr('y1', 0)
      .attr('x2', i * width / 10).attr('y2', height)
      .attr('stroke', 'rgba(255,255,255,0.03)')
      .attr('stroke-width', 1);
  }

  // Simplified continent shapes (circles for now as placeholders)
  const continents = [
    { name: 'أفريقيا', x: 0.5, y: 0.55, r: 0.12, color: '#e74c3c' },
    { name: 'آسيا', x: 0.7, y: 0.35, r: 0.15, color: '#3498db' },
    { name: 'أوروبا', x: 0.52, y: 0.28, r: 0.08, color: '#2ecc71' },
    { name: 'أمريكا الشمالية', x: 0.2, y: 0.3, r: 0.12, color: '#f39c12' },
    { name: 'أمريكا الجنوبية', x: 0.28, y: 0.65, r: 0.1, color: '#9b59b6' },
    { name: 'أستراليا', x: 0.82, y: 0.7, r: 0.07, color: '#1abc9c' }
  ];

  continents.forEach(c => {
    const g = svg.append('g').attr('class', 'continent');

    g.append('circle')
      .attr('cx', c.x * width)
      .attr('cy', c.y * height)
      .attr('r', c.r * Math.min(width, height))
      .attr('fill', c.color)
      .attr('opacity', 0.3)
      .attr('stroke', c.color)
      .attr('stroke-width', 2)
      .style('cursor', 'pointer')
      .on('click', () => {
        toast(`🌍 ${c.name}`);
      });

    g.append('text')
      .attr('x', c.x * width)
      .attr('y', c.y * height)
      .attr('text-anchor', 'middle')
      .attr('dy', '0.35em')
      .attr('fill', '#fff')
      .attr('font-size', '12px')
      .attr('font-weight', '700')
      .text(c.name);
  });

  // Team markers (dynamic based on scores)
  updateMapMarkers(svg, width, height);
}

function updateMapMarkers(svg, width, height) {
  // This will be updated with real team positions based on game state
}

// ===================== ORIENTATION =====================
window.addEventListener('orientationchange', () => {
  if (document.getElementById('gameScreen').classList.contains('active')) {
    setTimeout(() => initMap(), 300);
  }
});

// ===================== INIT =====================
console.log('🎮 صراع القارات - جاهز للعب');
</script>
